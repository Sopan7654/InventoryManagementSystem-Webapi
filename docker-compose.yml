# ═══════════════════════════════════════════════════════════════════════════════
#  Inventory Management System — Docker Compose
#
#  Services:
#    mysql    → MySQL 8.0 database with persistent volume
#    api      → ASP.NET Core 8 Web API (port 5000 on host)
#    frontend → React + Vite served via Nginx (port 3000 on host)
#
#  Usage:
#    docker-compose up --build        # first run (builds images)
#    docker-compose up -d             # run in background
#    docker-compose down              # stop & remove containers
#    docker-compose down -v           # also remove persistent volume
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── MySQL 8.0 Database ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ims-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Sopan@123
      MYSQL_DATABASE: InventoryManagementDB
      MYSQL_ROOT_HOST: '%'
    # Port 3306 is NOT exposed to the host — the API reaches MySQL via the
    # internal Docker network. This avoids conflicts with any local MySQL instance.
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pSopan@123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - ims-network

  # ── Redis (Caching & Token Blacklist) ───────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: ims-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ims-network

  # ── ASP.NET Core 8 Web API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ims-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # ── Connect to your LOCAL MySQL (host machine) via host.docker.internal ──
      # host.docker.internal is Docker Desktop's built-in DNS name that resolves
      # to your Windows host machine — so it uses your existing MySQL with real data.
      ConnectionStrings__InventoryDB: "Server=host.docker.internal;Port=3306;Database=InventoryManagementDB;Uid=root;Pwd=Sopan@123;Connection Timeout=30;SslMode=Disabled;AllowPublicKeyRetrieval=true;"
      ConnectionStrings__Redis: "redis:6379"
    ports:
      - "5000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ensures Linux containers can reach host
    networks:
      - ims-network

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./inventory-frontend
      dockerfile: Dockerfile
    container_name: ims-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - ims-network

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  ims-network:
    driver: bridge
