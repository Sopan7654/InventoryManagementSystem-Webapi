<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>IMS — Event Storming</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;font-family:'Inter',sans-serif;overflow:hidden;width:100vw;height:100vh;user-select:none}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(20,20,40,0.95);border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:14px;padding:0 20px;z-index:100;backdrop-filter:blur(10px)}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#f97316,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:14px;font-weight:800;color:#fff}
.badge{font-size:10px;font-weight:700;padding:2px 10px;background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.35);border-radius:99px}
.hright{margin-left:auto;display:flex;gap:12px;align-items:center}

/* LEGEND */
.leg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:#94a3b8}
.ldot{width:16px;height:16px;border-radius:3px;flex-shrink:0}

/* CANVAS */
#wrap{position:fixed;top:52px;left:0;right:0;bottom:32px;overflow:hidden;cursor:grab}
#wrap:active{cursor:grabbing}
#cvs{position:absolute;top:0;left:0;width:5000px;height:2200px;transform-origin:0 0}

/* SWIMLANES */
.lane{position:absolute;left:0;width:5000px;border-bottom:1px solid rgba(255,255,255,0.06)}
.lane-label{position:absolute;left:0;width:140px;height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:16px;font-size:11px;font-weight:700;letter-spacing:0.5px;color:rgba(255,255,255,0.35);text-transform:uppercase;writing-mode:horizontal-tb;border-right:2px solid rgba(255,255,255,0.08)}

/* PHASE HEADERS */
.phase{position:absolute;top:0;border-left:2px dashed;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border-radius:0 0 8px 0}

/* STICKY NOTE */
.note{position:absolute;width:120px;min-height:72px;border-radius:3px;padding:8px 9px;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:3px 4px 12px rgba(0,0,0,0.5);font-family:'Patrick Hand',cursive}
.note:hover{transform:translateY(-5px) rotate(1deg) scale(1.06);box-shadow:6px 10px 28px rgba(0,0,0,0.7);z-index:50}
.note .nt{font-size:11.5px;font-weight:600;line-height:1.35;color:rgba(0,0,0,0.82)}
.note .ns{font-size:9.5px;color:rgba(0,0,0,0.55);margin-top:4px;line-height:1.3}
.note .ni{font-size:20px;margin-bottom:2px}
.note::after{content:'';position:absolute;bottom:0;right:0;width:18px;height:18px;background:rgba(0,0,0,0.12);clip-path:polygon(100% 0,100% 100%,0 100%)}

/* ARROW SVG */
#arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}

/* TOOLTIP */
#tip{position:fixed;background:#1e2035;border:1px solid #2e3350;border-radius:10px;padding:11px 15px;font-size:12px;max-width:240px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:999;line-height:1.6}
#tip.on{opacity:1}
#tip h4{font-size:13px;font-weight:700;color:#fff;margin-bottom:5px}
#tip p{color:#94a3b8;font-size:11px}
#tip ul{color:#64748b;font-size:10.5px;padding-left:14px;margin-top:4px}

/* CONTROLS */
#ctrl{position:fixed;bottom:40px;left:16px;display:flex;gap:7px;z-index:200}
.cb{width:34px;height:34px;background:#1e2035;border:1px solid #2e3350;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#e2e8f0;transition:background .15s}
.cb:hover{background:#2e3350}

/* BOTTOM BAR */
footer{position:fixed;bottom:0;left:0;right:0;height:32px;background:rgba(20,20,40,0.95);border-top:1px solid #2a2a4a;display:flex;align-items:center;gap:16px;padding:0 16px;font-size:10px;color:#475569;z-index:100}
footer span{color:#64748b;font-weight:600}
footer b{color:#94a3b8}

/* HOTSPOT */
.hotspot{position:absolute;width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid #fff;z-index:20;cursor:pointer;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
</style>
</head>
<body>

<header>
  <div class="logo">📦</div>
  <h1>Inventory Management System</h1>
  <span class="badge">Event Storming</span>
  <div class="hright">
    <div class="leg"><div class="ldot" style="background:#f97316"></div>Domain Event</div>
    <div class="leg"><div class="ldot" style="background:#3b82f6"></div>Command</div>
    <div class="leg"><div class="ldot" style="background:#eab308"></div>Aggregate</div>
    <div class="leg"><div class="ldot" style="background:#a855f7"></div>Policy / Reaction</div>
    <div class="leg"><div class="ldot" style="background:#ec4899"></div>External System</div>
    <div class="leg"><div class="ldot" style="background:#22c55e"></div>Read Model</div>
    <div class="leg"><div class="ldot" style="background:#e2e8f0"></div>Actor / User</div>
  </div>
</header>

<div id="wrap">
  <div id="cvs">
    <svg id="arrows" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div id="tip"></div>

<div id="ctrl">
  <div class="cb" onclick="zm(1.18)" title="Zoom In">＋</div>
  <div class="cb" onclick="zm(0.82)" title="Zoom Out">－</div>
  <div class="cb" onclick="rst()" title="Reset">⊙</div>
  <div class="cb" onclick="fit()" title="Fit">⊠</div>
</div>

<footer>
  <span>🖱 Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Hover sticky notes for details</span>
  <b>&nbsp;|&nbsp;</b> C# .NET 8 &nbsp;·&nbsp; MySQL 8 &nbsp;·&nbsp; EF Core 8 &nbsp;·&nbsp; ADO.NET &nbsp;·&nbsp; xUnit + Moq
</footer>

<script>
// ─── COLOUR PALETTE ───────────────────────────────────────
const C = {
  event:   { bg:'#f97316', shadow:'#c2510a' },   // orange — Domain Events
  cmd:     { bg:'#3b82f6', shadow:'#1d4ed8' },   // blue   — Commands
  agg:     { bg:'#eab308', shadow:'#a16207' },   // yellow — Aggregates

  extern:  { bg:'#ec4899', shadow:'#9d174d' },   // pink   — External Systems

  { id:'cmd-ac', type:'cmd',    x:510, y:80,  icon:'🗂️', title:'Add Category',      sub:'Name · Parent?', tip:{h:'Command → CategoryRepository',p:'Inserts new product category (supports hierarchy).',items:['CategoryId (GUID)','ParentCategoryId (self-ref FK)']} },
  // Aggregates
  { id:'agg-pr', type:'agg',    x:700, y:80,  icon:'📦', title:'Product',           sub:'ProductId · SKU\nCost · IsActive', tip:{h:'Aggregate Root — Product',p:'Core product entity managed by ProductRepository (ADO.NET).',items:['ProductId PK','SKU UNIQUE idx','CategoryId FK → ProductCategory','Cost, ListPrice decimal(18,2)','EF Core: idx_product_sku, idx_product_name']} },

  { id:'a-mgr2', type:'actor',  x:3530,y:1460, icon:'👤', title:'Manager',           sub:'Views reports & alerts', tip:{h:'Actor',p:'Manager reviewing inventory health.',items:[]} },
  { id:'cmd-rpt',type:'cmd',    x:3680,y:1460, icon:'📊', title:'View Stock Report', sub:'All levels · Low-stock filter', tip:{h:'Command → ReportService.GetStockSummary()',p:'Reads StockLevelRepository for aggregated view.',items:['GetAll() with JOINs','Filter: IsLowStock','Sorted by warehouse']} },

  { id:'cmd-ls', type:'cmd',    x:3680,y:1580, icon:'🔔', title:'Low Stock Alert',   sub:'QtyOnHand < ReorderLevel', tip:{h:'Command → ReportService.GetLowStockItems()',p:'Fetches products below reorder threshold.',items:['SQL: WHERE QuantityOnHand < ReorderLevel','Groups by warehouse']} },

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
const cvs = document.getElementById('cvs');
const svg = document.getElementById('arrows');

// Draw swimlanes
LANES.forEach(ln => {
  const d = document.createElement('div');
  d.className = 'lane';
  d.style.cssText = `top:${ln.y}px;height:${ln.h}px;background:${ln.color}08;`;
  const lbl = document.createElement('div');
  lbl.className = 'lane-label';
  lbl.style.cssText = `color:${ln.color};border-right-color:${ln.color}40;`;
  lbl.textContent = ln.label;
  d.appendChild(lbl);
  cvs.appendChild(d);
});

// Draw phase headers
PHASES.forEach(ph => {
  const d = document.createElement('div');
  d.className = 'phase';
  d.style.cssText = `left:${ph.x}px;width:${ph.w}px;color:${ph.color};border-color:${ph.color}55;background:${ph.color}10;`;
  d.textContent = ph.label;
  cvs.appendChild(d);
});

// Draw notes and build id→el map
const elMap = {};
NOTES.forEach(n => {
  const col = C[n.type];
  const d = document.createElement('div');
  d.className = 'note';
  d.id = 'n-'+n.id;
  d.style.cssText = `left:${n.x}px;top:${n.y}px;background:${col.bg};background:linear-gradient(145deg,${col.bg},${col.shadow});`;
  d.innerHTML = `<div class="ni">${n.icon}</div><div class="nt">${n.title}</div><div class="ns">${n.sub.replace(/\n/g,'<br/>')}</div>`;
  d.addEventListener('mouseenter', e => showTip(e, n));
  d.addEventListener('mousemove',  e => moveTip(e));
  d.addEventListener('mouseleave', hideTip);
  cvs.appendChild(d);
  elMap[n.id] = d;
});

// Tooltip
const tip = document.getElementById('tip');
function showTip(e, n) {
  const t = n.tip;
  tip.innerHTML = `<div style="font-size:9px;font-weight:700;color:${C[n.type].bg};text-transform:uppercase;margin-bottom:4px">${n.type.toUpperCase()}</div><h4>${n.icon} ${n.title}</h4><p>${t.p}</p>${t.items.length?`<ul>${t.items.map(i=>`<li>${i}</li>`).join('')}</ul>`:''}`; 
  tip.classList.add('on'); moveTip(e);
}
function moveTip(e) {
  let x=e.clientX+14, y=e.clientY+14;
  if(x+260>window.innerWidth) x=e.clientX-270;
  if(y+280>window.innerHeight) y=e.clientY-200;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip() { tip.classList.remove('on'); }

// Draw arrows
function noteCenter(id) {
  const el = elMap[id];
  if(!el) return null;
  return { x: parseInt(el.style.left)+60, y: parseInt(el.style.top)+50 };
}

function drawArrows() {
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  ARROWS.forEach((ar, i) => {
    const fc = noteCenter(ar.from), tc = noteCenter(ar.to);
    if(!fc||!tc) return;
    const mid = `arrow${i}`;
    const mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id',mid); mk.setAttribute('markerWidth','7'); mk.setAttribute('markerHeight','7');
    mk.setAttribute('refX','5'); mk.setAttribute('refY','2.5'); mk.setAttribute('orient','auto');
    const po = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    po.setAttribute('points','0 0, 5 2.5, 0 5'); po.setAttribute('fill',ar.color);
    mk.appendChild(po); defs.appendChild(mk);
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    const cx=(fc.x+tc.x)/2, cy=Math.min(fc.y,tc.y)-30;
    p.setAttribute('d',`M${fc.x},${fc.y} Q${cx},${cy} ${tc.x},${tc.y}`);
    p.setAttribute('stroke',ar.color); p.setAttribute('stroke-width','1.6');
    p.setAttribute('fill','none'); p.setAttribute('opacity','0.55');
    if(ar.style==='dashed') p.setAttribute('stroke-dasharray','5 3');
    p.setAttribute('marker-end',`url(#${mid})`);
    svg.appendChild(p);
  });
  svg.insertBefore(defs, svg.firstChild);
}
setTimeout(drawArrows, 80);

// Animate dashes
let off=0;
function animDash() {
  off=(off+0.4)%8;
  svg.querySelectorAll('path').forEach(p=>{ p.style.strokeDashoffset=-off; });
  requestAnimationFrame(animDash);
}
animDash();

// ─── PAN + ZOOM ──────────────────────────────────────────
const wrap = document.getElementById('wrap');
let sc=0.42, tx=160, ty=20, drag=false, sx, sy, stx, sty;
function applyT() { cvs.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`; }
applyT();
wrap.addEventListener('mousedown', e => { drag=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty; });
window.addEventListener('mousemove', e => { if(!drag) return; tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyT(); drawArrows(); });
window.addEventListener('mouseup', ()=>{ drag=false; });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f=e.deltaY>0?0.92:1.08;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left-tx, my=e.clientY-r.top-ty;
  tx-=mx*(f-1); ty-=my*(f-1);
  sc=Math.max(0.15,Math.min(2.5,sc*f));
  applyT(); drawArrows();
}, {passive:false});
function zm(f) { const cx=wrap.clientWidth/2,cy=wrap.clientHeight/2; tx-=(cx-tx)*(f-1); ty-=(cy-ty)*(f-1); sc=Math.max(0.15,Math.min(2.5,sc*f)); applyT(); drawArrows(); }
function rst() { sc=0.42; tx=160; ty=20; applyT(); drawArrows(); }
function fit() { sc=0.32; tx=120; ty=10; applyT(); drawArrows(); }
window.addEventListener('resize', ()=>{ drawArrows(); });
</script>
