# ─────────────────────────────────────────────────────────────────────────────
# Secret — sensitive credentials stored as Kubernetes Secret
# stringData is automatically base64-encoded by Kubernetes at creation time.
#
# Apply: kubectl apply -f k8s/mysql-secret.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: inventory-system
  labels:
    app.kubernetes.io/component: database
type: Opaque
stringData:
  mysql-root-password: "Sopan@123"
  connection-string: "Server=mysql;Port=3306;Database=InventoryManagementDB;Uid=root;Pwd=Sopan@123;Connection Timeout=30;SslMode=None;"
