# ─────────────────────────────────────────────────────────────────────────────
# ASP.NET Core API Deployment + ClusterIP Service
#
# Prerequisites:
#   1. Build & push image:
#      docker build -t inventory-management-api:latest .
#      (For minikube: eval $(minikube docker-env) before building)
#
# Apply: kubectl apply -f k8s/api-deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: inventory-system
  labels:
    app: api
    app.kubernetes.io/component: backend
spec:
  replicas: 2                         # 2 replicas for high availability
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0               # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: api
    spec:
      # ── Init container: wait until MySQL is ready before starting API ───────
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -zv mysql 3306; do
                echo "Waiting for MySQL...";
                sleep 5;
              done;
              echo "MySQL is ready!";
      containers:
        - name: api
          image: inventory-management-api:latest
          imagePullPolicy: IfNotPresent    # Use local image (for minikube/kind)
          # ── Non-sensitive config from ConfigMap ──────────────────────────────
          envFrom:
            - configMapRef:
                name: api-config
          # ── Sensitive config from Secret ─────────────────────────────────────
          env:
            - name: ConnectionStrings__InventoryDB
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: connection-string
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # ── Liveness: restart if the API hangs ──────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # ── Readiness: only send traffic when /health returns 200 ────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # ── Resource requests/limits ─────────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterIP Service — internal DNS: api.inventory-system.svc.cluster.local
# Port 8080 matches ASPNETCORE_URLS in the ConfigMap
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: inventory-system
  labels:
    app: api
    app.kubernetes.io/component: backend
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
