# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for the Inventory Management System Frontend
#
# In Docker / Kubernetes, the backend API is reachable at http://api:8080
# (the service name defined in docker-compose.yml / kubernetes Service).
# ─────────────────────────────────────────────────────────────────────────────

upstream backend {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # ── Proxy /api/* → ASP.NET Core backend ──────────────────────────────────
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Proxy /swagger/* → ASP.NET Core backend (dev convenience) ────────────
    location /swagger/ {
        proxy_pass         http://backend/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Proxy /health → ASP.NET Core backend ─────────────────────────────────
    location /health {
        proxy_pass         http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — long-lived browser cache ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        try_files          $uri =404;
    }

    # ── React SPA — all other routes fall back to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
